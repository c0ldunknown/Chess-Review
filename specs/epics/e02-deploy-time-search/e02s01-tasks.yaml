        - "UI"

  - id: e02s01t05
    description: >
      Update the per-position timeout in runNextAnalysisQueueItem.
      If in time mode, timeout = movetime_ms + 5000ms.
      If in depth mode, keep the existing 30s timeout.
    verify: |
      grep -q '5000' script.js
    risk: P1
    status: passing
    allure:
      severity: high
      categories:
        - "Engine"

  - id: e02s01t06
    description: >
      Verify end-to-end: load a game, switch to Time mode (8s), click Analyze,
