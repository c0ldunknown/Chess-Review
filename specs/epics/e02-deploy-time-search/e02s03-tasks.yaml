# e02s03-tasks.yaml
story_id: e02s03
title: "Render deployment"
bcps: 2
status: passing
description: >
  Create render.yaml and push the project to the main branch on GitHub.
  Configure Render to auto-deploy from GitHub. Verify the app is live
  and works end-to-end.
tasks:
  - id: e02s03t01
    description: >
      Create render.yaml at the repo root with web service config.
    verify: |
      test -f render.yaml && grep -q 'startCommand.*index.js' render.yaml && grep -q 'buildCommand.*install' render.yaml
    risk: P2
    status: passing
    allure:
      severity: normal
      categories:
        - "Infrastructure"

  - id: e02s03t02
    description: >
      Ensure .env is in .gitignore so API keys aren't committed.
    verify: |
      grep -q '\.env' .gitignore
    risk: P2
    status: passing
    allure:
      severity: normal
      categories:
        - "Security"

  - id: e02s03t03
    description: >
      Verify server/package.json has correct start script.
    verify: |
      grep -q '"start".*"node index.js"' server/package.json
    risk: P2
    status: passing
    allure:
      severity: normal
      categories:
        - "Infrastructure"

  - id: e02s03t04
    description: >
      Commit all changes and push to main branch on GitHub.
    verify: |
      echo "Manual: git push origin main"
    status: passing

  - id: e02s03t05
    description: >
      Set up Render web service via the Render dashboard:
      Connect GitHub repo (main branch), Render detects render.yaml,
      set environment variables.
    verify: |
      echo "Manual: render.com setup"
    status: passing

  - id: e02s03t06
    description: >
      Verify the live deployment at https://chess-review-rq1k.onrender.com.
      App loads, debug game loads, analysis runs, explanations work.
    verify: |
      curl -s https://chess-review-rq1k.onrender.com | grep -q 'Chess Review'
    risk: P1
    status: passing
    allure:
      severity: high
      categories:
        - "Integration"
