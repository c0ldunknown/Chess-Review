# specs/epics/e02-deploy-time-search/epic.yaml
epic_id: e02
title: "Render deployment + time-based Stockfish search"
description: >
  Deploy the full app to Render as a single Express service serving both
  the static frontend files and the LLM proxy API. Add time-based Stockfish
  search (go movetime N) with a depth/time mode toggle so analysis time is
  consistent per position.

  On Render, the app lives at a single URL (chess-review.onrender.com) that
  friends can open without any local setup. Locally, the Express server now
  serves the frontend too so you only need one terminal.

  The frontend gets a minor restructure: static files move to server/public/,
  API URLs become relative, and the default PGN textarea shows a placeholder
  with a "Load debug game" button for quick testing.
