# specs/planning-context.yaml
feature_name: "wasm-stockfish-upgrade"
problem_statement: |
  The current Stockfish is C++ compiled to JavaScript via Emscripten, running
  in a Web Worker. JS-emulated C++ is ~3-5x slower than native WebAssembly.
  Analysis takes longer than it should — a position that takes 8s in JS would
  finish in ~2s with WASM at the same depth.
constraints:
  - "Must remain a static vanilla JS frontend (no build step)"
  - "CDN-hosted WASM files (no self-hosting)"
  - "Must work on Render free tier without custom headers"
  - "Must preserve the current time-based search (8s default)"
  - "Must fall back gracefully if WASM compilation fails"
  - "Local dev must still work (node server/index.js)"
out_of_scope:
  - "Multi-threaded Stockfish (requires COOP/COEP headers not available on Render free tier)"
  - "Stockfish NNUE neural network weights (larger binary, minimal gain over plain WASM)"
  - "Any UI changes beyond the Stockfish loading indicator"
out_of_scope_permanent:
  - "Multi-language support"
  - "Voice/audio explanations"
key_decisions:
  - decision: "Use stockfish.wasm package from jsdelivr CDN"
    rationale: "Same author as most Stockfish WASM ports (Niklas Fiekas), used by Lichess. Well-maintained, single-file CDN load."
  - decision: "Single-threaded WASM mode (no SharedArrayBuffer)"
    rationale: "Render free tier can't set COOP/COEP headers needed for pthreads. Single-threaded WASM is still 3-5x faster than current JS-emulated Stockfish."
  - decision: "Load WASM via CDN importScripts in Worker, same pattern as current fetch→blob→Worker"
    rationale: "Minimal code change — replace the CDN URL and adjust Worker init. No build step."
unresolved: []
