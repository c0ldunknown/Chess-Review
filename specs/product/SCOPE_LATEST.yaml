# specs/product/SCOPE_LATEST.yaml
# Scope for: WASM Stockfish upgrade

core_value: "Stockfish analysis finishes 3-5x faster by swapping the JavaScript-emulated engine for a native WebAssembly build."

summary: |
  The current Stockfish engine (`stockfish.js` v10.0.2 from cdnjs) is the original
  Emscripten port that compiles Stockfish C++ to JavaScript. Running JS-emulated
  C++ in a Web Worker is inherently slow — about 3-5x slower than native WASM.

  This scope swaps the CDN URL for `stockfish.wasm` (v0.10.0 by Niklas Fiekas,
  the same engine Lichess uses) served from jsdelivr. The WASM binary is loaded
  by the browser's WebAssembly runtime, giving near-native performance.

  The Worker pattern stays the same — the only code change is in `analysis.js`
  where the CDN URL and Worker initialization logic are updated to load the WASM
  version. Time-based search (8s default) remains the default — WASM just reaches
  much deeper in the same time budget.

in_scope:
  - "Replace stockfish.js CDN URL with stockfish.wasm CDN URL in analysis.js"
    reason: "The core change — one URL swap gives 3-5x speedup"
  - "Update Worker initialization to match stockfish.wasm's loading pattern"
    reason: "WASM builds use a different init pattern than the plain JS blob"
  - "Preserve existing search mode toggle (Depth | Time), dropdown values, and timeout logic"
    reason: "No behavioral changes — just a faster engine underneath"
  - "Handle WASM loading errors gracefully (show 'Analysis unavailable' message)"
    reason: "WASM might fail in older browsers; must degrade gracefully per CONVENTIONS.md"
  - "Verify analysis completes earlier (deeper search in same time budget)"
    reason: "Observable proof the upgrade works"

out_of_scope:
  - "Multi-threaded (pthreads) Stockfish mode"
    reason: "Requires COOP/COEP HTTP headers which Render free tier doesn't support. Single-threaded WASM is still a massive improvement."
  - "NNUE neural network weights"
    reason: "Adds ~20MB download with minimal elo gain over plain WASM at the same time control"
  - "Self-hosting WASM files in server/public/"
    reason: "CDN is simpler, faster (global edge), and zero maintenance"
  - "UI changes beyond the loading indicator"
    reason: "The engine swap is invisible to users except for speed"

constraints:
  - "No build step — CDN-only"
  - "Single-threaded WASM only (no SharedArrayBuffer)"
  - "Must work in Chrome, Firefox, Safari (latest 2 versions)"
  - "Must gracefully handle browsers that don't support WASM"

success_criteria:
  - "Analysis takes noticeably less time — 8s time mode reaches depth ~16-18 instead of ~12-13"
  - "Same game analyzed in both modes produces the same classifications (blunder/mistake/etc.)"
  - "Loading the app in a browser with WASM support works normally"
  - "Loading in a browser without WASM shows a degraded message (no crash)"
  - "All existing features (PGN loading, navigation, explanation panel, jump-to-error) unchanged"

references:
  - specs/planning-context.yaml
  - https://github.com/niklasf/stockfish.wasm
  - https://cdn.jsdelivr.net/npm/stockfish.wasm@0.10.0/
